# ========== Description ==========
## ----- Items -----
### Resources
item.fb-dynamics-zinc.description = Basic resource. Abundant near the surface.
item.fb-dynamics-malachite.description = Beautiful green mineral with mystical properties...
item.fb-dynamics-tantalum.description = Durable metal used for more advanced tech. The deeper you go, the more you find.
### Components
item.fb-dynamics-part-basic.description = [#aa996e]Zinc[] sheet engraved with [#85ad85]malachite[] circuits. Crucial for early tech.
## ----- Fluids -----
### Gasses
liquid.fb-dynamics-steam.description = Boiling hot. Can be transported through pipes; transfers kinetic power to machines.
liquid.fb-dynamics-hot-spring-water.description = Water found in [#00959c]hot springs[]. Sterile, but contains lots of [#f3edce]sulfur[] and mineral salts. Must be purified before industrial use.
## ----- Units -----
### Auger
unit.fb-dynamics-auger-drone.description = [#aa8e6e]Assist-Core unit[]. Assists in mining resources and shoots healing [#85ad85]malachite[] shards at damaged structures but cannot build or damage enemies.
### Core unit
unit.fb-dynamics-breathe.description = [#aa8e6e]Core unit[]. Capable of construction. Shoots homing [#85ad85]malachite[] shards to protect the core.
## ----- Sectors -----
### Testing
sector.fb-dynamics-test-sector.description = Area for testing. Not part of the campaign.\n [red]Abandon sector when it gets updated.[]
## ----- Status Effects -----
### Negative
status.fb-dynamics-corroding.description = The sulfurous acid rain is extremely corrosive...
status.fb-dynamics-shielding.description = Shields units from the harmful effects of corrosion.
## ----- Blocks -----
### Turrets
block.fb-dynamics-withdraw.description = Uses pressure from [#d6eaf3]steam[] to launch chunks of [#85ad85]malachite[] at enemies.
### Defense
block.fb-dynamics-steam-valve.description = Releases [#d6eaf3]steam[] to push enemies away.
### Distribution
block.fb-dynamics-accelerator.description = Transports items by shooting them.
block.fb-dynamics-zinc-sorter.description = Takes input from the back, outputs filtered item out front and outputs the rest from the sides.
### Crafting
block.fb-dynamics-mechanical-press.description = Uses pressure from [#d6eaf3]steam[] to engrave [#85ad85]malachite[] circuits into [#aa996e]zinc[] sheets.
### Liquid Blocks
block.fb-dynamics-pipe.description = Transports fluids. Does not accept inputs from the sides.
block.fb-dynamics-pipe-router.description = All sides are inputs and outputs for fluids.
block.fb-dynamics-pipe-tunnel.description = Transports fluids underground, passing under buildings and terrain.
block.fb-dynamics-pipe-junction.description = Allows two pipes to cross without mixing their contents. Can be toggled off to stop fluids from going through.
block.fb-dynamics-pipe-vent.description = Releases any fluid that flows into it.
block.fb-dynamics-pipe-controller.description = Toggles nearby pipe valves when fluid flows through it.
### Production
block.fb-dynamics-steam-collector.description = Collects hot [#d6eaf3]steam[] from geysers.
block.fb-dynamics-clockwork-drill.description = Builds up [#d6eaf3]steam[], then releases it at once to strike the earth.
### Effect
block.fb-dynamics-core-surface.description = The [#aa8e6e]Core[] of your base. Must be protected at all costs; failure results in loss of control and termination of command. Guarded by the Core Unit.
block.fb-dynamics-auger-pad.description = A secondary [#aa8e6e]Assist-Core[] that must be constantly powered with [#d6eaf3]steam[] to support the Assist-Core Unit.
### Logic
block.fb-dynamics-zinc-message.description = Displays a message using a [#85ad85]malachite[] display.
### Payload
block.fb-dynamics-basic-constructor.description = Constructs unit parts from materials.
block.fb-dynamics-zinc-conveyor.description = Transports payloads and units.
block.fb-dynamics-basic-deconstructor.description = Deconstructs blocks and units into materials.
block.fb-dynamics-split-assembler.description = Assembles units from a B.U.A.K. and a unit Frame.
### Component Blocks
block.fb-dynamics-b-u-a-k.description = [#aa8e6e]Basic Unit Assembler Kit[], the internal components for early units.
block.fb-dynamics-split-frame.description = Unit frame constructed for Split.

# ========== Details ==========
## ----- Items -----
### Resources
item.fb-dynamics-zinc.details = Found in [#e09321]Sphalerite[] in high concentrations. Not to be confused with Zirconium.
item.fb-dynamics-malachite.details = Unusually magnetic, due to oddities in the planet's gravitational field... This calls for more research.
item.fb-dynamics-cinnabar.details = [#f3edce]Sulfur[] caves were invented by me, actually ('u')
## ----- Blocks -----
### Turrets
block.fb-dynamics-withdraw.details = [#85ad85]Malachite[] shards seem to attract to enemies after breaking...
### Defense
block.fb-dynamics-steam-valve.details = Uses a magnetic compass made of [#85ad85]malachite[] to detect when enemies are nearby.
### Liquid Blocks
block.fb-dynamics-pipe-junction.details = Steamworks? I sure hope it does!
### Production
block.fb-dynamics-clockwork-drill.details = Strike the Earth! Rock and Stone!
### Effect
block.fb-dynamics-core-surface.details = Only 10% of an iceberg is visible above the water. What you see now is just the tip.
## ----- Units -----
### Auger
unit.fb-dynamics-auger-drone.details = When its core runs out of [#d6eaf3]steam[], it collapses and its shell needs to be reconstructed. Please treat with care. It feels pain and remembers.
### Core unit
unit.fb-dynamics-breathe.details = Itsy bitsy spider climbed up the water spout.\n Down came the rain and washed the spider out.\n Out came the sun and dried up all the rain,\n so the itsy bitsy spider climbed up the spout again.
### Tank
unit.fb-dynamics-split.details = You fell for it, fool!\n Thunder Cross Split Attack!
