# ========== Description ==========
## ----- Items -----
### Resources
item.fb-dynamics-zinc.description = Basic resource. Abundant near the surface.
item.fb-dynamics-malachite.description = Beautiful green mineral with mystical properties...
item.fb-dynamics-tantalum.description = Durable metal used for more advanced tech. The deeper you go, the more you find.
### Crafted
item.fb-dynamics-sublime.description = Highly reactive substance.
### Components
item.fb-dynamics-part-basic.description = Crucial for early tech.
## ----- Fluids -----
### Gasses
liquid.fb-dynamics-steam.description = Boiling hot. Can be transported through pipes; transfers kinetic power to machines.
liquid.fb-dynamics-hot-spring-water.description = Water found in hot springs. Sterile, but contains lots of sulfur and mineral salts. Must be purified before industrial use.
## ----- Units -----
### Auger
unit.fb-dynamics-auger-drone.description = Assist unit. Assists in mining resources repairing damaged structures but cannot build or damage enemies.
### Core unit
unit.fb-dynamics-breathe.description = Core unit. Capable of construction. Shoots homing malachite shards to protect the core.
## ----- Blocks -----
### Turrets
block.fb-dynamics-withdraw.description = Uses pressure from steam to launch chunks of malachite at enemies.
### Defense
block.fb-dynamics-steam-valve.description = Releases steam to push enemies away.
### Distribution
block.fb-dynamics-accelerator.description = Transports items by shooting them.
block.fb-dynamics-zinc-sorter.description = Takes input from the back, outputs filtered item out front and outputs the rest from the sides.
### Crafting
block.fb-dynamics-mechanical-press.description = Uses pressure from steam to engrave malachite circuits into zinc sheets.
### Liquid Blocks
block.fb-dynamics-pipe.description = Transports fluids. Does not accept inputs from the sides.
block.fb-dynamics-pipe-router.description = All sides are inputs and outputs for fluids.
block.fb-dynamics-pipe-tunnel.description = Transports fluids underground, passing under buildings and terrain.
block.fb-dynamics-pipe-junction.description = Allows two pipes to cross without mixing their contents. Can be toggled off to stop fluids from going through.
### Production
block.fb-dynamics-steam-collector.description = Collects hot steam from geysers.
block.fb-dynamics-clockwork-drill.description = Builds up steam, then releases it at once to strike the earth.
### Effect
block.fb-dynamics-core-surface.description = The Nexus of your base. Must be protected at all costs; failure results in loss of control and termination of command.
block.fb-dynamics-auger-pad.description = A secondary core that must be constantly powered with steam to support the Assist Unit.

# ========== Details ==========
## ----- Items -----
### Resources
item.fb-dynamics-zinc.details = Found in Sphalerite in high concentrations. Not to be confused with Zirconium.
item.fb-dynamics-cinnabar.details = Sulfur caves were invented by me, actually ('u')
## ----- Blocks -----
### Turrets
block.fb-dynamics-withdraw.details = Malachite shards seem to attract to enemies after breaking...
### Defense
block.fb-dynamics-steam-valve.details = Uses a magnetic compass made of malachite to detect when enemies are nearby.
### Production
block.fb-dynamics-clockwork-drill.details = Strike the Earth! Rock and Stone!
### Effect
block.fb-dynamics-core-surface.details = Only 10% of an iceberg is visible above the water. What you see now is just the tip.
## ----- Units -----
### Auger
unit.fb-dynamics-auger-drone.details = When its core runs out of steam, it collapses and its shell needs to be reconstructed. Please treat with care. It feels pain and remembers.
### Core unit
unit.fb-dynamics-breathe.details = Itsy bitsy spider climbed up the water spout. Down came the rain and washed the spider out. Out came the sun and dried up all the rain, so the itsy bitsy spider climbed up the spout again.
