block.dy-basic-constructor.description = Constructs unit parts from materials.
block.dy-zinc-conveyor.name = Large Conveyor
block.dy-zinc-conveyor.description = Transports payloads and units.
block.dy-basic-deconstructor.name = Basic Deconstructor
block.dy-basic-deconstructor.description = Deconstructs blocks and units into materials.
block.dy-split-assembler.name = Basic Unit Assembler
block.dy-split-assembler.description = Assembles units from a B.U.A.K. and a unit Frame.
## ----- Component Blocks -----
block.dy-b-u-a-k.name = [#aa8e6e]B.U.A.K.[]
block.dy-b-u-a-k.description = [#aa8e6e]Basic Unit Assembler Kit[], the internal components for early units.
block.dy-split-frame.name = [#aa8e6e]Split Frame[]
block.dy-split-frame.description = Unit frame constructed for Split.
