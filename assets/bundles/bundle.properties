block.dy-split-fabricator.description = Constructs Split, which may be used to assault the enemy base or upgraded into more powerful units.
block.dy-ember-fabricator.name = Ember Fabricator
block.dy-ember-fabricator.description = Constructs Ember, which may be used to assault the enemy base or upgraded into more powerful units.
