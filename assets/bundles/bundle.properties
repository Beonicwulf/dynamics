# ========== Items ==========
## ----- Resources -----
item.dy-zinc.name = Zinc
item.dy-zinc.description = Basic resource. Abundant near the surface.
item.dy-zinc.details = Found in [#e09321]Sphalerite[] in high concentrations. Not to be confused with Zirconium.
item.dy-malachite.name = Malachite
item.dy-malachite.description = Beautiful green mineral with mystical properties...
item.dy-malachite.details = Unusually magnetic, due to oddities in the planet's gravitational field... This calls for more research.
item.dy-tantalum.name = Tantalum
item.dy-tantalum.description = Durable metal used for more advanced tech. The deeper you go, the more you find.
## ----- Components -----
item.dy-part-basic.name = Basic Component
item.dy-part-basic.description = [#aa996e]Zinc[] sheet engraved with [#85ad85]malachite[] circuits. Crucial for early tech.
## ----- Crafted -----
item.dy-sodium.name = Sodium
# ========== Fluids ==========
## ----- Flux -----
liquid.dy-flux.name = Crystal Flux
liquid.dy-flux.description = An odd fluid with useful and unusual properties.
liquid.dy-flux.details = Emitted by [#85ad85]malachite[] when pressure is applied in a rhythmic manner, the pressure it applies can be used to heat up or cool down machinery.
## ----- Gasses -----
liquid.dy-chlorine.name = Chlorine
## ----- Liquids -----
liquid.dy-hot-spring-water.name = Hot Spring Water
liquid.dy-hot-spring-water.description = Water found in [#00959c]hot springs[]. Sterile, but contains lots of [#f3edce]sulfur[] and mineral salts. Must be purified before industrial use.
liquid.dy-purified-water.name = Salt Water
# ========== Units ==========
## ----- Auger -----
unit.dy-auger-drone.name = Tusk
unit.dy-auger-drone.description = [#aa8e6e]Assist-Core unit[]. Assists in mining resources and shoots healing [#85ad85]malachite[] shards at damaged structures but cannot build or damage enemies.
unit.dy-auger-drone.details = When its core runs out of [#93d9b4]flux[], it collapses and its shell needs to be reconstructed. Please treat with care. It feels pain and remembers.
unit.dy-auger-assembler.name = Fang
## ----- Core unit -----
unit.dy-breathe.name = Breathe
unit.dy-breathe.description = [#aa8e6e]Core unit[]. Capable of construction. Shoots homing [#85ad85]malachite[] shards to protect the core.
unit.dy-breathe.details = Itsy bitsy spider climbed up the water spout.\n Down came the rain and washed the spider out.\n Out came the sun and dried up all the rain,\n so the itsy bitsy spider climbed up the spout again.
## ----- Split -----
unit.dy-split.name = Split
unit.dy-split.description = A small and nimble tank that launches [#85ad85]malachite[] shards at enemies. Power in number.
unit.dy-split.details = You fell for it, fool!\n Thunder Cross Split Attack!
## ----- Ember -----
unit.dy-ember.name = Ember
# ========== Blocks ==========
## ----- Turrets -----
block.dy-withdraw.name = Withdraw
block.dy-withdraw.description = Uses [#93d9b4]flux[] to launch chunks of [#85ad85]malachite[] at enemies.
block.dy-withdraw.details = [#85ad85]Malachite[] shards seem to attract to enemies after breaking...
## ----- Walls -----
block.dy-malachite-wall.name = Malachite Wall
block.dy-malachite-wall.description = Rudimentary walls made of [#85ad85]malachite[]. Release shards upon being hit.
block.dy-malachite-wall-large.name = Large Malachite Wall
block.dy-malachite-wall-large.description = Rudimentary walls made of [#85ad85]malachite[]. Release shards upon being hit.
block.dy-framed-malachite.name = Warframe
block.dy-framed-malachite.description = A reinforced frame with a [#85ad85]malachite[] block within. Releases shards upon being hit.
## ----- Defense -----
block.dy-steam-valve.name = Flux Valve
block.dy-steam-valve.description = Releases [#93d9b4]flux[] to push enemies away.
block.dy-steam-valve.details = Uses a magnetic compass made of [#85ad85]malachite[] to detect when enemies are nearby.
## ----- Distribution -----
block.dy-accelerator.name = Item Accelerator
block.dy-accelerator.description = Transports items by shooting them.
block.dy-zinc-sorter.name = Mechanical Sorter
block.dy-zinc-sorter.description = Takes input from the back, outputs filtered item out front and outputs the rest from the sides.
block.dy-zinc-unloader.name = Mechanical Unloader
block.dy-zinc-unloader.description = Takes stored items out of blocks and outputs them to the front and sides. Useful for chaining factories.
## ----- Crafting -----
block.dy-flux-heater.name = Flux Outlet
block.dy-flux-heater.description = Uses [#93d9b4]flux[] to power machinery and turrets.
block.dy-grafter.name = Circuit Grafter
block.dy-grafter.description = Uses heat and pressure from [#93d9b4]flux[] to engrave [#85ad85]malachite[] circuits into [#aa996e]zinc[] sheets.
block.dy-salt-splitter.name = Salt Electrolyzer
## ----- Liquid Blocks -----
block.dy-pipe.name = Pipe
block.dy-pipe.description = Transports fluids. Does not accept inputs from the sides.
block.dy-pipe-router.name = Pipe Router
block.dy-pipe-router.description = All sides are inputs and outputs for fluids.
block.dy-pipe-tunnel.name = Pipe Tunnel
block.dy-pipe-tunnel.description = Transports fluids underground, passing under buildings and terrain.
block.dy-pipe-junction.name = Pipe Valve
block.dy-pipe-junction.description = Allows two pipes to cross without mixing their contents. Can be toggled off to stop fluids from going through.
block.dy-pipe-junction.details = Steamworks? I sure hope it does!
block.dy-pipe-vent.name = Pipe Vent
block.dy-pipe-vent.description = Releases any fluid that flows into it.
block.dy-pipe-controller.name = Pipe Controller
block.dy-pipe-controller.description = Toggles nearby pipe valves when fluid flows through it.
## ----- Production -----
block.dy-clockwork-drill.name = Clockwork Drill
block.dy-clockwork-drill.description = Slowly grinds away at the earth.
block.dy-clockwork-drill.details = Strike the Earth! Rock and Stone!
block.dy-micro-drill.name = Miniature Drill
block.dy-flux-collector.name = Flux Resonator
block.dy-flux-collector.description = Extracts [#93d9b4]flux[] from [#85ad85]malachite[] by invoking a certain resonance within the crystals.
## ----- Storage -----
block.dy-core-surface.name = [#aa8e6e]Sora[]
block.dy-core-surface.description = The [#aa8e6e]Core[] of your base. Must be protected at all costs; failure results in loss of control and termination of command. Guarded by the Core Unit.
block.dy-core-surface.details = Only 10% of an iceberg is visible above the water. What you see now is just the tip.
block.dy-auger-pad.name = [#aa8e6e]Auger Nexus[]
block.dy-auger-pad.description = A secondary [#aa8e6e]Assist-Core[] that must be constantly powered with [#93d9b4]flux[] to support the Assist-Core Unit.
# block.dy-core-shallow.name = Kairi
